<!doctype html>

<html>

<head>
    <meta charset="utf-8">
    <title>DarkPDF</title>
    <script src="scripts/userInterface.js"></script>
    <link rel="stylesheet" href="stylesheet/style.css">
    <link rel="stylesheet" href="./uikit/css/uikit.min.css" />
    <script src="./uikit/js/uikit.min.js"></script>
    <script src="./uikit/js/uikit-icons.min.js"></script>
</head>

<body>
    <div class="uk-text-center" uk-grid>
        <div class="uk-width-auto@m">
            <div class="uk-card uk-card-secondary uk-card-body">
                Instructions: go to <a href="chrome://extensions/" target="_blank">extensions tab</a> on Chrome, click <b>Details</b> under DarkPDF, and turn on <b>Allow Access to File URLs</b>
                <br><br>  
                Turn on dark mode by clicking the extension icon, and switch themes by clicking on the buttons below. Click a button twice to disable dark mode. 


                <div id="color-buttons" class="button-group">
                    
                        <button class="color-button" data-color="#d9d9d9">Soft Dark</button>
                        <button class="color-button" data-color="#f2f2f2">High Contrast</button>
                        <button class="color-button" data-color="#fdf6e3">Solarized</button>
                        <button class="color-button" data-color="#ecffdc">Mint</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
